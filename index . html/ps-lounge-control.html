<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Station Control — PS Lounge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0c0f1a;
    --bg-grid: #10152400;
    --panel: #141a2b;
    --panel-edge: #1f2740;
    --ink: #eef1fb;
    --ink-dim: #8892b0;
    --ps5: #46d6ff;
    --ps5-dim: #1c4a5c;
    --ps4: #ffb648;
    --ps4-dim: #5c4520;
    --danger: #ff5470;
    --ok: #3ddc97;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    background:
      radial-gradient(circle at 15% -10%, #1a2540 0%, transparent 45%),
      radial-gradient(circle at 100% 0%, #241a3e 0%, transparent 40%),
      var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height:100vh;
    padding: 28px 20px 60px;
  }

  header{
    max-width: 1280px;
    margin: 0 auto 28px;
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    flex-wrap: wrap;
    gap: 10px;
    border-bottom: 1px solid var(--panel-edge);
    padding-bottom: 18px;
  }

  header h1{
    font-family:'Space Grotesk', sans-serif;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin:0;
  }
  header h1 span{ color: var(--ps5); }

  .rates{
    display:flex;
    gap: 22px;
    font-family:'JetBrains Mono', monospace;
    font-size: 12.5px;
    color: var(--ink-dim);
  }
  .rates b{ color: var(--ink); font-weight:600; }
  .rates .tag{
    display:inline-block; width:8px; height:8px; border-radius:2px; margin-right:6px;
  }
  .tag.p5{ background: var(--ps5); }
  .tag.p4{ background: var(--ps4); }

  .grid{
    max-width: 1280px;
    margin: 0 auto;
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }

  @media (max-width: 980px){ .grid{ grid-template-columns: repeat(2, 1fr);} }
  @media (max-width: 560px){ .grid{ grid-template-columns: 1fr;} }

  .card{
    background: linear-gradient(180deg, var(--panel), #10152488);
    border: 1px solid var(--panel-edge);
    border-radius: 14px;
    padding: 16px;
    position:relative;
    overflow:hidden;
    transition: border-color .25s ease, box-shadow .25s ease;
  }
  .card.active{
    box-shadow: 0 0 0 1px var(--accent), 0 0 24px -4px var(--accent);
    border-color: var(--accent);
  }
  .card[data-console="PS5"]{ --accent: var(--ps5); }
  .card[data-console="PS4"]{ --accent: var(--ps4); }

  .card-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom: 14px;
  }

  .room-name{
    font-family:'Space Grotesk', sans-serif;
    font-size: 19px;
    font-weight:700;
  }
  .console-badge{
    font-family:'JetBrains Mono', monospace;
    font-size: 10.5px;
    font-weight:700;
    letter-spacing: 0.06em;
    padding: 3px 8px;
    border-radius: 5px;
    color: #0c0f1a;
    background: var(--accent);
    margin-top: 4px;
    display:inline-block;
  }

  .status-dot{
    width:9px; height:9px; border-radius:50%;
    background: #2c344e;
    margin-top: 6px;
  }
  .card.active .status-dot{
    background: var(--ok);
    box-shadow: 0 0 8px 1px var(--ok);
  }

  .mode-toggle{
    display:flex;
    background:#0c1120;
    border:1px solid var(--panel-edge);
    border-radius: 8px;
    padding: 3px;
    margin-bottom: 14px;
  }
  .mode-toggle button{
    flex:1;
    border:none;
    background:transparent;
    color: var(--ink-dim);
    font-family:'Inter', sans-serif;
    font-size: 12.5px;
    font-weight:600;
    padding: 7px 0;
    border-radius: 6px;
    cursor:pointer;
    transition: all .15s ease;
  }
  .mode-toggle button.selected{
    background: var(--accent);
    color:#0c0f1a;
  }
  .mode-toggle button:disabled{
    cursor:not-allowed;
    opacity: .55;
  }

  .timer-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 14px;
    padding: 10px 0 4px;
  }

  .timer{
    font-family:'JetBrains Mono', monospace;
    font-size: 34px;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--ink-dim);
    font-variant-numeric: tabular-nums;
  }
  .card.active .timer{
    color: var(--ink);
    text-shadow: 0 0 18px var(--accent);
  }

  .divider{
    width: 1px;
    height: 26px;
    background: var(--panel-edge);
  }

  .live-price{
    font-family:'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--ink-dim);
    font-variant-numeric: tabular-nums;
  }
  .card.active .live-price{
    color: var(--accent);
  }
  .live-price .cur{
    font-size: 11px;
    font-weight:600;
    color: var(--ink-dim);
    margin-left: 3px;
  }

  .rate-line{
    text-align:center;
    font-size: 11.5px;
    color: var(--ink-dim);
    font-family:'JetBrains Mono', monospace;
    margin-bottom: 14px;
  }

  .btn-row{
    display:flex;
    gap: 8px;
  }
  .btn{
    flex:1;
    border:none;
    border-radius: 8px;
    padding: 10px 0;
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size: 13.5px;
    cursor:pointer;
    transition: transform .12s ease, filter .15s ease;
  }
  .btn:active{ transform: scale(0.97); }
  .btn:disabled{ opacity:.35; cursor:not-allowed; }

  .btn-start{
    background: var(--ok);
    color: #0a2417;
  }
  .btn-stop{
    background: var(--danger);
    color: #2a0b12;
  }
  .btn:hover:not(:disabled){ filter: brightness(1.08); }

  .bill{
    margin-top: 12px;
    background: #0c1120;
    border: 1px dashed var(--panel-edge);
    border-radius: 8px;
    padding: 8px 10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-family:'JetBrains Mono', monospace;
    font-size: 12.5px;
    opacity: 0;
    max-height: 0;
    transition: opacity .25s ease;
  }
  .bill.show{ opacity:1; max-height: 60px; }
  .bill .price{
    font-size: 17px;
    font-weight: 700;
    color: var(--accent);
  }

  footer{
    max-width: 1280px;
    margin: 30px auto 0;
    text-align:center;
    color: var(--ink-dim);
    font-size: 12px;
    font-family:'JetBrains Mono', monospace;
  }
</style>
</head>
<body>

<header>
  <h1>Station <span>Control</span></h1>
  <div class="rates">
    <span><span class="tag p5"></span>PS5 — <b>80</b> single / <b>120</b> multi / hr</span>
    <span><span class="tag p4"></span>PS4 — <b>60</b> single / <b>100</b> multi / hr</span>
  </div>
</header>

<div class="grid" id="grid"></div>

<footer>Price is calculated the instant you press Stop, based on exact minutes played.</footer>

<script>
const RATES = {
  PS5: { single: 80, multi: 120 },
  PS4: { single: 60, multi: 100 }
};

// 10 PS5 rooms + 2 PS4 rooms = 12 total
const rooms = [];
for (let i = 1; i <= 10; i++) rooms.push({ id: i, console: 'PS5' });
for (let i = 11; i <= 12; i++) rooms.push({ id: i, console: 'PS4' });

const grid = document.getElementById('grid');

const state = {}; // per room: { mode, running, startTime, timerInterval }

function fmtTime(ms){
  const totalSec = Math.floor(ms/1000);
  const h = String(Math.floor(totalSec/3600)).padStart(2,'0');
  const m = String(Math.floor((totalSec%3600)/60)).padStart(2,'0');
  const s = String(totalSec%60).padStart(2,'0');
  return `${h}:${m}:${s}`;
}

function buildCard(room){
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.console = room.console;
  card.id = `card-${room.id}`;

  card.innerHTML = `
    <div class="card-top">
      <div>
        <div class="room-name">Room ${room.id}</div>
        <div class="console-badge">${room.console}</div>
      </div>
      <div class="status-dot" id="dot-${room.id}"></div>
    </div>

    <div class="mode-toggle" id="mode-${room.id}">
      <button data-mode="single" class="selected">Single</button>
      <button data-mode="multi">Multi</button>
    </div>

    <div class="timer-row">
      <div class="timer" id="timer-${room.id}">00:00:00</div>
      <div class="divider"></div>
      <div class="live-price" id="live-price-${room.id}">0<span class="cur">EGP</span></div>
    </div>
    <div class="rate-line" id="rate-${room.id}">${RATES[room.console].single} EGP / hr</div>

    <div class="btn-row">
      <button class="btn btn-start" id="start-${room.id}">Start</button>
      <button class="btn btn-stop" id="stop-${room.id}" disabled>Stop</button>
    </div>

    <div class="bill" id="bill-${room.id}">
      <span id="bill-time-${room.id}"></span>
      <span class="price" id="bill-price-${room.id}"></span>
    </div>
  `;
  grid.appendChild(card);

  state[room.id] = { mode: 'single', running: false, startTime: null, interval: null };

  // mode toggle
  const modeButtons = card.querySelectorAll('.mode-toggle button');
  modeButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      if (state[room.id].running) return;
      modeButtons.forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      state[room.id].mode = btn.dataset.mode;
      document.getElementById(`rate-${room.id}`).textContent =
        `${RATES[room.console][btn.dataset.mode]} EGP / hr`;
    });
  });

  document.getElementById(`start-${room.id}`).addEventListener('click', () => startRoom(room));
  document.getElementById(`stop-${room.id}`).addEventListener('click', () => stopRoom(room));
}

function startRoom(room){
  const s = state[room.id];
  if (s.running) return;
  s.running = true;
  s.startTime = Date.now();

  document.getElementById(`card-${room.id}`).classList.add('active');
  document.getElementById(`start-${room.id}`).disabled = true;
  document.getElementById(`stop-${room.id}`).disabled = false;
  document.getElementById(`mode-${room.id}`).querySelectorAll('button').forEach(b => b.disabled = true);
  document.getElementById(`bill-${room.id}`).classList.remove('show');
  document.getElementById(`live-price-${room.id}`).innerHTML = `0<span class="cur">EGP</span>`;

  const rate = RATES[room.console][s.mode];
  s.interval = setInterval(() => {
    const elapsedMs = Date.now() - s.startTime;
    document.getElementById(`timer-${room.id}`).textContent = fmtTime(elapsedMs);
    const livePrice = Math.round((elapsedMs / 3600000) * rate);
    document.getElementById(`live-price-${room.id}`).innerHTML = `${livePrice}<span class="cur">EGP</span>`;
  }, 1000);
}

function stopRoom(room){
  const s = state[room.id];
  if (!s.running) return;
  const elapsedMs = Date.now() - s.startTime;
  clearInterval(s.interval);
  s.running = false;

  const hours = elapsedMs / 3600000;
  const rate = RATES[room.console][s.mode];
  const price = Math.round(hours * rate);
  const minutesPlayed = Math.max(1, Math.round(elapsedMs / 60000));

  document.getElementById(`card-${room.id}`).classList.remove('active');
  document.getElementById(`timer-${room.id}`).textContent = fmtTime(elapsedMs);
  document.getElementById(`start-${room.id}`).disabled = false;
  document.getElementById(`stop-${room.id}`).disabled = true;
  document.getElementById(`mode-${room.id}`).querySelectorAll('button').forEach(b => b.disabled = false);

  document.getElementById(`bill-time-${room.id}`).textContent = `${minutesPlayed} min · ${s.mode}`;
  document.getElementById(`bill-price-${room.id}`).textContent = `${price} EGP`;
  document.getElementById(`bill-${room.id}`).classList.add('show');

  // reset timer display for next session after a short pause so the price is seen
  setTimeout(() => {
    if (!state[room.id].running) {
      document.getElementById(`timer-${room.id}`).textContent = '00:00:00';
    }
  }, 4000);
}

rooms.forEach(buildCard);
</script>

</body>
</html>
